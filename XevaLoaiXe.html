<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Nhập Liệu Xe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #3C9AFF 0%, #006BFF 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex justify-center items-start pt-12 p-4">

    <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-lg">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Nhập Thông Tin Xe
        </h2>

        <form method="post" action="#">

            <!-- Biển số xe -->
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">
                    Biển Số Xe
                </label>
                <input type="text" name="BienSo"
                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-blue-500 outline-none"
                       placeholder="30A-123.45" required>
            </div>

            <!-- Số đăng ký -->
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">
                    Số Đăng Ký
                </label>
                <input type="number" name="SoDK"
                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-blue-500 outline-none"
                       placeholder="123456" required>
            </div>

            <!-- Màu xe -->
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">
                    Màu Xe
                </label>
                <input type="text" name="MauXe"
                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-blue-500 outline-none"
                       placeholder="Đen" required>
            </div>

            <!-- Dung tích -->
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">
                    Dung Tích (cc)
                </label>
                <input type="number" name="DungTich"
                       class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-blue-500 outline-none"
                       placeholder="1500" required>
            </div>

            <!-- Trạng thái -->
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-1">
                    Trạng Thái
                </label>
                <select name="TrangThai"
                        class="w-full bg-gray-100 border border-transparent rounded-lg px-4 py-3 text-sm focus:border-blue-500 outline-none"
                        required>
                    <option value="">-- Chọn Trạng Thái --</option>
                    <option value="Còn trống">Còn trống</option>
                    <option value="Đang thuê">Đang thuê</option>
                    <option value="Bảo trì">Bảo trì</option>
                </select>
            </div>

            <!-- Loại xe (liên kết bảng Loại Xe) -->
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-1">
                    Loại Xe
                </label>
                <select name="id_LoaiXe"
                        class="w-full bg-gray-100 border border-transparent rounded-lg px-4 py-3 text-sm focus:border-blue-500 outline-none"
                        required>
                    <option value="">-- Chọn Loại Xe --</option>
                    <option value="1">Xe máy</option>
                    <option value="2">Ô tô</option>
                    <option value="3">Xe tải</option>
                    <option value="4">Xe khách</option>
                </select>
            </div>

            <!-- Button -->
            <div class="text-center">
                <button type="submit"
                        class="bg-blue-500 text-white font-bold py-3 px-8 rounded-full shadow hover:bg-blue-600 transition-transform active:scale-95">
                    Lưu Thông Tin Xe
                </button>
            </div>

        </form>
    </div>

</body>
</html>
