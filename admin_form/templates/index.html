<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Xe - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: linear-gradient(135deg, #FF9A3C 0%, #FF6B00 100%); min-height: 100vh; }
    </style>
</head>
<body class="p-4 flex justify-center items-start pt-10">

    <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-4xl relative min-h-[600px]">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Admin Dashboard</h2>

        <!-- Tabs Navigation -->
        <div class="flex justify-center mb-8 border-b border-gray-200">
            <button onclick="switchTab('loaixe')" id="tab-loaixe" class="px-6 py-2 text-orange-500 border-b-2 border-orange-500 font-bold focus:outline-none transition-colors">
                1. Quản Lý Loại Xe
            </button>
            <button onclick="switchTab('xe')" id="tab-xe" class="px-6 py-2 text-gray-400 font-medium hover:text-gray-600 focus:outline-none transition-colors">
                2. Quản Lý Xe
            </button>
        </div>

        <!-- SECTION 1: LOẠI XE -->
        <div id="section-loaixe" class="animate-fade-in">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Thêm Loại Xe Mới</h3>
            <form id="formLoaiXe" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Mô Tả (Tên loại xe)</label>
                    <input type="text" name="MoTa" placeholder="Ví dụ: SUV 7 chỗ, Honda City..." class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Giá Thuê (VND/Ngày)</label>
                    <input type="number" name="GiaThue" placeholder="Ví dụ: 500000" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none" required>
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="bg-orange-500 text-white font-bold py-2 px-6 rounded-full shadow hover:bg-orange-600 transition-transform active:scale-95">
                        Lưu Loại Xe
                    </button>
                </div>
            </form>
            
            <!-- Danh sách loại xe (Preview) -->
            <div class="mt-8">
                <h4 class="text-sm font-bold text-gray-500 mb-2">Danh sách loại xe hiện có</h4>
                <div id="listLoaiXe" class="bg-gray-100 rounded-xl p-4 h-48 overflow-y-auto space-y-2">
                    <!-- Loading... -->
                </div>
            </div>
        </div>

        <!-- SECTION 2: XE -->
        <div id="section-xe" class="hidden animate-fade-in">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Thêm Xe Mới</h3>
            <form id="formXe" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Biển Số (PK)</label>
                        <input type="text" name="bienso" placeholder="29A-12345" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Số Đăng Ký</label>
                        <input type="number" name="sodk" placeholder="123456789" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Mẫu Xe (Màu sắc/Chi tiết)</label>
                        <input type="text" name="mauxe" placeholder="Màu đen, bản Sport..." class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Dung Tích (cc)</label>
                        <input type="number" name="dungtich" placeholder="1500" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Loại Xe</label>
                        <select name="id_LoaiXe" id="selectLoaiXe" class="w-full bg-gray-100 border border-transparent rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none" required>
                            <option value="">-- Chọn Loại Xe --</option>
                            <!-- Options will be loaded here -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1 ml-1">Trạng Thái</label>
                        <select name="trangthai" class="w-full bg-gray-100 border border-transparent rounded-lg px-4 py-3 text-sm focus:border-orange-500 outline-none">
                            <option value="SanSang">Sẵn Sàng</option>
                            <option value="DangThue">Đang Thuê</option>
                            <option value="BaoTri">Bảo Trì</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="bg-orange-500 text-white font-bold py-3 px-8 rounded-full shadow hover:bg-orange-600 transition-transform active:scale-95">
                        Lưu Xe
                    </button>
                </div>
            </form>
        </div>

    </div>

    <script src="/static/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
